name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.4.0)"
        required: true
        type: string
      prerelease:
        description: "Mark as pre-release"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Install toolchain (pinned)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.90.0
          targets: ${{ matrix.target }}

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build
        run: cargo build -p zdx --release --locked --target ${{ matrix.target }}

      - name: Package
        run: tar -czf zdx-${{ inputs.tag }}-${{ matrix.target }}.tar.gz -C target/${{ matrix.target }}/release zdx

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zdx-${{ matrix.target }}
          path: zdx-${{ inputs.tag }}-${{ matrix.target }}.tar.gz
          if-no-files-found: error

  publish:
    name: publish release ${{ inputs.tag }}
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ inputs.tag }}" dist/*.tar.gz \
            --title "${{ inputs.tag }}" \
            --generate-notes \
            --target "${{ github.sha }}" \
            ${{ inputs.prerelease && '--prerelease' || '' }}
